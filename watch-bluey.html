<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Bluey - Season 3 (50 Episodes)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .video-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .video-thumbnail {
            width: 100%;
            height: 169px;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-button:hover {
            background: white;
            transform: scale(1.1);
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .video-episode {
            color: #666;
            font-size: 0.9em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal iframe {
            width: 90%;
            height: 90%;
            max-width: 1200px;
            max-height: 675px;
            border: none;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }

        .volume-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1002;
        }

        .volume-slider {
            width: 120px;
            height: 5px;
            accent-color: #4CAF50;
        }

        .max-volume-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>

<body>

            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="2" step="0.1" value="2"

        const grid = document.getElementById('videoGrid');
        episodes.forEach(episode => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => openModal(`https://drive.google.com/file/d/${episode.fileId}/preview`);
            card.innerHTML = `
                <div class="video-overlay">
                    <img src="${episode.thumbnail}" class="video-thumbnail" loading="lazy" alt="${episode.title}">
                    <div class="play-overlay">
                        <button class="play-button">▶ ${episode.title}</button>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">${episode.title}</div>
                    <div class="video-episode">${episode.episode}</div>
                </div>
            `;
            grid.appendChild(card);
        });

        function openModal(url) {
            document.getElementById('videoPlayer').src = url + '?autoplay=1&mute=0&rm=minimal';
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('volumeSlider').value = 2;
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('videoPlayer').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').onclick = e => e.target === document.getElementById('modal') && closeModal();
        document.onkeydown = e => e.key === 'Escape' && closeModal();

        function setVolume(v) {
            const iframe = document.getElementById('videoPlayer');
            iframe.contentWindow.postMessage({ type: 'setVolume', volume: v }, '*');
        }

        function maxVolume() {
            setVolume(2);
        }
